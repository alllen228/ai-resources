<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 教程资源库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --tag-bg: #3730a3;
        }
        [data-theme="light"] {
            --bg: #f8fafc;
            --bg-card: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --tag-bg: #818cf8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 3rem; flex-wrap: wrap; gap: 1rem;
        }
        h1 {
            font-size: 2.5rem; margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { color: var(--text-secondary); font-size: 1.1rem; }
        .theme-toggle {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 0.75rem 1.25rem; cursor: pointer; font-size: 1.2rem;
        }
        .theme-toggle:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .search-box { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        #searchInput {
            flex: 1; min-width: 250px; padding: 1rem 1.5rem;
            border: 2px solid var(--border); border-radius: 12px;
            background: var(--bg-card); color: var(--text); font-size: 1rem;
        }
        #searchInput:focus { outline: none; border-color: var(--primary); }
        .filter-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
        .filter-tag {
            padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 20px;
            background: transparent; color: var(--text-secondary); cursor: pointer;
            font-size: 0.9rem; transition: all 0.2s;
        }
        .filter-tag:hover, .filter-tag.active { background: var(--primary); border-color: var(--primary); color: white; }
        .date-group { margin-bottom: 3rem; }
        .date-header {
            font-size: 1.3rem; color: var(--text-secondary); margin-bottom: 1rem;
            padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
        }
        .date-toggle { transition: transform 0.2s; }
        .date-toggle.collapsed { transform: rotate(-90deg); }
        .date-content { overflow: hidden; transition: max-height 0.3s; }
        .date-content.collapsed { max-height: 0 !important; }
        .resource-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
        .resource-card {
            background: var(--bg-card); border-radius: 16px; padding: 1.5rem;
            border: 1px solid var(--border); transition: transform 0.2s, box-shadow 0.2s;
        }
        .resource-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .resource-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75rem; line-height: 1.4; }
        .resource-title a { color: var(--text); text-decoration: none; transition: color 0.2s; }
        .resource-title a:hover { color: var(--primary); }
        .resource-summary {
            color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }
        .resource-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .tag {
            padding: 0.25rem 0.75rem; background: var(--tag-bg); border-radius: 12px;
            font-size: 0.75rem; color: #e0e7ff;
        }
        .stats { display: flex; gap: 2rem; margin-bottom: 2rem; padding: 1rem; background: var(--bg-card); border-radius: 12px; flex-wrap: wrap; }
        .stat { text-align: center; flex: 1; min-width: 100px; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 0.85rem; color: var(--text-secondary); }
        .no-results { text-align: center; padding: 4rem; color: var(--text-secondary); }
        footer { text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 0.85rem; }
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            h1 { font-size: 1.8rem; }
            .resource-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>AI 教程资源库</h1>
                <p class="subtitle">每日自动采集 B站 AI Agent & 大模型教程</p>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </header>
        
        <div class="stats">
            <div class="stat"><div class="stat-value" id="totalCount">0</div><div class="stat-label">总资源数</div></div>
            <div class="stat"><div class="stat-value" id="dateCount">0</div><div class="stat-label">采集天数</div></div>
            <div class="stat"><div class="stat-value" id="todayCount">0</div><div class="stat-label">今日新增</div></div>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索标题或内容...">
        </div>
        
        <div class="filter-tags" id="filterTags">
            <button class="filter-tag active" data-filter="all">全部</button>
            <button class="filter-tag" data-filter="Agent">Agent Skills</button>
            <button class="filter-tag" data-filter="LangGraph">LangGraph</button>
            <button class="filter-tag" data-filter="LangChain">LangChain</button>
            <button class="filter-tag" data-filter="MCP">MCP</button>
            <button class="filter-tag" data-filter="RAG">RAG</button>
            <button class="filter-tag" data-filter="Prompt">Prompt</button>
            <button class="filter-tag" data-filter="Cursor">Cursor</button>
        </div>
        
        <div id="resourceList"></div>
        
        <footer>
            <p>自动更新于 <span id="lastUpdate"></span></p>
        </footer>
    </div>
    
    <script>
const allData = [
    {"title": "【2026最新版】目前B站最全最细的AI Agent智能体系统教程", "url": "https://www.bilibili.com/video/BV1Fcf2BLEGv/", "summary": "手把手教你从0基础开始搭建企业级Agent智能体！包含所有干货，让你少走99%弯路！！！项目扩展包括agent数字人系列。", "tags": ["Agent", "LangGraph", "实战"], "date": "2026-04-04"},
    {"title": "【2026最新版】B站最全大模型Skills Agent零基础教程", "url": "https://www.bilibili.com/video/BV1h4rDBwEh7/", "summary": "保姆级AI Agent智能体系统教程，基于OpenCode开源版Claude Code的Agent Skills开发教程。", "tags": ["Agent", "Skills", "OpenCode"], "date": "2026-04-04"},
    {"title": "【全158集】Agent Skills全套教程 2026最新版", "url": "https://www.bilibili.com/video/BV14ucxzKExU/", "summary": "目前B站最全最细的Agent Skills全套教程，七天就能从小白到大神，少走99%的弯路！", "tags": ["Agent", "Skills", "入门"], "date": "2026-04-04"},
    {"title": "2026讲的最好的大模型LangGraph+MCP+RAG实战教程", "url": "https://www.bilibili.com/video/BV1h3BWB2E4D/", "summary": "阿里架构师讲解，带你3小时从0到1吃透企业级多智能体实战。LangGraph+MCP+RAG组合拳。", "tags": ["LangGraph", "MCP", "RAG", "架构"], "date": "2026-04-04"},
    {"title": "零基础LangGraph极速2分钟构建MCP RectAgent", "url": "https://www.bilibili.com/video/BV1XUjMzzED2/", "summary": "黑马程序员2026最新版LangChain+LangGraph开发实战，Agent开发到LangSmith监控调试评估一套搞定。", "tags": ["LangChain", "LangGraph", "MCP"], "date": "2026-04-04"},
    {"title": "2026基于全新LangChain V1.x+LangGraph实战", "url": "https://www.bilibili.com/video/BV1xTqTBHEwq/", "summary": "别再看过时的教程了！2026基于全新LangChain V1.x+LangGraph V1.x+FastAPI框架实现的可复制Agent闭环解决方案。", "tags": ["LangChain", "LangGraph", "FastAPI"], "date": "2026-04-04"},
    {"title": "吴恩达2026年公认最好的Agent智能体教程", "url": "https://www.bilibili.com/video/BV1qv6eBZErD/", "summary": "大模型入门到进阶，Agentic AI，附课件代码。深入讲解Agent设计模式：反思、工具使用、规划、多Agent协作。", "tags": ["Agent", "理论"], "date": "2026-04-04"},
    {"title": "李宏毅AI Agent系列课程全集（71集）", "url": "https://www.bilibili.com/video/BV1hhFPzmEkD/", "summary": "（B站首推）2026李宏毅智能体AI Agent系列课程全集，公认体验感最好的入门课程！", "tags": ["Agent", "入门"], "date": "2026-04-04"},
    {"title": "AI-Agent 86个项目实战教程", "url": "https://www.bilibili.com/video/BV1hhFPzmEkD/", "summary": "从零基础入门到精通全套教程！一次性搞懂大模型智能体开发，学完就能进大厂！包含Langchain/RAG/Agent/MCP学习资源。", "tags": ["Agent", "LangChain", "MCP", "RAG"], "date": "2026-04-04"},
    {"title": "Cursor + Playwright/Github MCP服务集成教程", "url": "https://www.bilibili.com/video/BV1hhFPzmEkD/", "summary": "Cursor下载安装并接入Playwright MCP服务，Cursor+Github MCP二次开发vue-element-admin项目实战。", "tags": ["Cursor", "MCP", "Playwright"], "date": "2026-04-04"},
    {"title": "Ollama 保姆级教程 2026", "url": "https://www.bilibili.com/video/BV1hhFPzmEkD/", "summary": "下载安装+本地部署+实战使用，零基础也能轻松学会AI大模型开发。", "tags": ["Ollama", "本地部署", "LLM"], "date": "2026-04-04"},
    {"title": "DeepSeek从入门到精通保姆级教程", "url": "https://www.bilibili.com/video/BV1hhFPzmEkD/", "summary": "2026保姆级教程，DeepSeek从入门到精通，全程干货无废话！", "tags": ["DeepSeek", "入门"], "date": "2026-04-04"},
    {"title": "Prompt Engineering 提示词工程教程", "url": "https://www.bilibili.com/video/BV1hhFPzmEkD/", "summary": "2小时彻底掌握提示词工程，深入浅出，草履虫都能听懂！", "tags": ["Prompt", "提示词"], "date": "2026-04-04"},
    {"title": "Coze智能体/工作流全套实战教程", "url": "https://www.bilibili.com/video/BV1hhFPzmEkD/", "summary": "Coze智能体入门到项目实战，涵盖提示词Prompt、RAG、Bot发布微信公众号。", "tags": ["Coze", "Bot", "工作流"], "date": "2026-04-04"},
    {"title": "知识库全套教程（748集）", "url": "https://www.bilibili.com/video/BV1hhFPzmEkD/", "summary": "全B站最全最细的搭建知识库全套教程，2026最新版，七天从小白到大神！", "tags": ["RAG", "知识库", "Embedding"], "date": "2026-04-04"}
];

let currentFilter = 'all';
let searchTerm = '';
const today = new Date().toISOString().split('T')[0];

function toggleTheme() {
    const body = document.body;
    const btn = document.querySelector('.theme-toggle');
    if (body.dataset.theme === 'light') {
        body.dataset.theme = 'dark';
        btn.textContent = '🌙';
        localStorage.setItem('theme', 'dark');
    } else {
        body.dataset.theme = 'light';
        btn.textContent = '☀️';
        localStorage.setItem('theme', 'light');
    }
}

const savedTheme = localStorage.getItem('theme') || 'dark';
if (savedTheme === 'light') {
    document.body.dataset.theme = 'light';
    document.querySelector('.theme-toggle').textContent = '☀️';
}

function renderResources() {
    const container = document.getElementById('resourceList');
    const filtered = allData.filter(r => {
        const matchFilter = currentFilter === 'all' || r.tags.some(t => t.includes(currentFilter));
        const matchSearch = !searchTerm || r.title.toLowerCase().includes(searchTerm.toLowerCase()) || r.summary.toLowerCase().includes(searchTerm.toLowerCase());
        return matchFilter && matchSearch;
    });
    
    if (filtered.length === 0) {
        container.innerHTML = '<div class="no-results">没有找到匹配的资源</div>';
        document.getElementById('totalCount').textContent = '0';
        document.getElementById('dateCount').textContent = '0';
        document.getElementById('todayCount').textContent = '0';
        return;
    }
    
    const grouped = {};
    filtered.forEach(r => {
        if (!grouped[r.date]) grouped[r.date] = [];
        grouped[r.date].push(r);
    });
    
    let html = '';
    Object.keys(grouped).sort().reverse().forEach(date => {
        const dayTotal = grouped[date].length;
        const isToday = date === today;
        html += `<div class="date-group">
            <div class="date-header" onclick="toggleDate('${date}')">
                <span class="date-toggle" id="toggle-${date}">▼</span>
                📅 ${date} ${isToday ? '(今日)' : ''} <span style="color: var(--text-secondary); font-size: 0.9rem;">(${dayTotal}条)</span>
            </div>
            <div class="date-content" id="content-${date}">
                <div class="resource-grid">`;
        grouped[date].forEach(r => {
            html += `<div class="resource-card">
                <div class="resource-title"><a href="${r.url}" target="_blank">${r.title}</a></div>
                <div class="resource-summary">${r.summary}</div>
                <div class="resource-tags">${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            </div>`;
        });
        html += '</div></div></div>';
    });
    
    container.innerHTML = html;
    document.getElementById('totalCount').textContent = filtered.length;
    document.getElementById('dateCount').textContent = Object.keys(grouped).length;
    document.getElementById('todayCount').textContent = grouped[today]?.length || 0;
}

function toggleDate(date) {
    const content = document.getElementById('content-' + date);
    const toggle = document.getElementById('toggle-' + date);
    if (content.classList.contains('collapsed')) {
        content.classList.remove('collapsed');
        toggle.classList.remove('collapsed');
    } else {
        content.classList.add('collapsed');
        toggle.classList.add('collapsed');
    }
}

document.getElementById('searchInput').addEventListener('input', e => {
    searchTerm = e.target.value;
    renderResources();
});

document.querySelectorAll('.filter-tag').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderResources();
    });
});

document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
renderResources();
    </script>
</body>
</html>
